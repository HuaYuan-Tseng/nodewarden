name: "Bug Report"
description: "Report a reproducible bug / 反饋可復現問題"
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. Please provide enough detail so maintainers can reproduce quickly.
        感謝反饋，請儘量提供可復現資訊，方便快速定位。

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-check / 提交前確認
      options:
        - label: I have searched existing issues and did not find a duplicate. / 我已搜尋現有 issue，確認不是重複問題。
          required: true
        - label: I have read README and Project Wiki / 我已閱讀 README 與 專案 Wiki。
          required: true

  - type: input
    id: version
    attributes:
      label: Version / 版本
      description: "Which version of NodeWarden are you using? Please provide the exact version or commit hash."
      placeholder: "1.0.0"
    validations:
      required: true

  - type: textarea
    id: reproduce_steps
    attributes:
      label: Steps to Reproduce / 復現步驟
      placeholder: |
        1. Start service with ...
        2. Open ...
        3. Click ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 預期行為
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 實際行為
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs and Screenshots / 日誌與截圖
      description: "Please paste key logs (docker logs / browser console / network errors)."
      render: shell
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional Context / 補充資訊
      description: "Any workaround, frequency, impact scope, etc."